name: Android CI Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Accept Android SDK Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Bootstrap Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        sed -i -e 's/\r$//' gradlew
        chmod +x gradlew

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "正在解碼內建的 debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        else
          echo "找不到 debug.keystore.base64，正在現場生成 debug 密鑰庫..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace --info

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReadAloudNotepad-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
